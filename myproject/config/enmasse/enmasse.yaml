external_scheduler:
  - name: "Agregação de Dados (tempo definido no script)"
    url: "http://localhost:11223/soft-iot/local-storage/aggregation" # URL completa
    job_type: "interval_based"
    interval: 5 #chamada para ele verificar se há dados para agregar
    unit: "minutes" # minutes, hours
    
  - name: "Limpeza (a cada 5 minutos)" #tempo deve ser maior do que o de agregação
    url: "http://localhost:11223/soft-iot/local-storage/cleanup"
    job_type: "interval_based"
    interval: 20
    unit: "minutes"

  - name: "Inicialização (Execução Única)"
    url: "http://localhost:11223/soft-iot/local-storage/start"
    job_type: "one_time"
    initial_delay: 15 # Espera 15s após o Zato subir para chamar
