    data_format: json
  - name: local_storage_cleanup
    service: soft-iot.cleanup.service
    url_path: /soft-iot/local-storage/cleanup
    data_format: json
  - name: local_storage_get_aggregated_data
    service: soft-iot.api.get-sensor-aggregated-data
    url_path: /soft-iot/local-storage/get-aggregated-data
    data_format: json
  - name: local_storage_get_history
    service: soft-iot.api.get-history
    url_path: /soft-iot/local-storage/get-history
    data_format: json
  - name: local_storage_get_last_aggregated_data
    service: soft-iot.api.get-sensor-last-aggregated-data
    url_path: /soft-iot/local-storage/get-last-aggregated-data
    data_format: json
  - name: local_storage_get_last_data
    service: soft-iot.api.get-last-data
    url_path: /soft-iot/local-storage/get-last-data
    data_format: json
  - name: local_storage_service_start
    service: soft-iot.storage.service
    url_path: /soft-iot/local-storage/start
    data_format: json
  - name: mapping_devices_get_device
    service: soft-iot.mapping.get-device
    url_path: /soft-iot/mapping-devices/get-device
    data_format: json
  - name: mapping_devices_list_devices
    service: soft-iot.mapping.list-devices
    url_path: /soft-iot/mapping-devices/list-devices
    data_format: json
  - name: kmeans_credibility_service
    service: soft-iot.kmeans.credibility
    url_path: /soft-iot/kmeans/credibility
    data_format: json
  - name: id_manager
    service: soft-iot.id.manager
    url_path: /soft-iot/id-manager
    data_format: json

